[module/sep]
type = custom/text
content  ="|"
content-foreground = #444444
[colors]
background = #660a0a0f
foreground = #e0e0ff
accent = #00f5ff
urgent=#ff0055
[module/tray]
type = internal/tray

format = <tray>
format-padding = 6
format-background = #2200f5ff
fromat-foreground = ${colors.accent}
tray-spacing = 10
[bar/example]
width = 96%
height = 32
offset-x = 18
offset-y = 8
radius = 12.0
background = ${colors.background}
foreground = ${colors.foreground}
font-0 = JetBrainsMono Nerd Font:size=9;2
font-1 = Symbols Nerd Font:size=12;2
font-2 = Noto Color Emoji:size=10
border-size = 2
border-color = #00f5ff
modules-left = term browser spotify files i3
modules-right = player sep bluetooth sep  cpu sep  memory sep  disk sep  network sep battery sep volume sep tray date
padding-left = 2
padding-right = 2
module-margin = 2
wm-restack = i3
override-redirect = false
line-size = 3 
line-color = #00f5ff
enable-ipc = true
cursor-click = pointer
tray-position = right
tray-padding = 2
tray-background = ${colors.background}
;;;;;;;;;;;;;;;;;;;;;;;;;;
;; LEFT SIDE ;;
;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/term]
type = custom/text
content = "  "
click-left = alacritty & 
; change to kitty if that's what You use , u need to change all alacritty in this file with kitty if u use kitty 


[module/browser]
type = custom/text
content = "   "
click-left = firefox &

[module/spotify]
type = custom/text
content = " "
click-left = gtk-launch com.spotify.Client & 
; install spotify using flatpak 

[module/files]
type = custom/text
content = " "
click-left = alacritty -e ranger &

;;;;;;;;;;;;;;;;;;;;;;;;;;
;; WORKSPACES ;;
;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/i3]
type = internal/i3

label-focused = "%name%"
label-focused-background = ${colors.accent}
label-focused-foreground = #000000
label-focused-padding = 2

label-unfocused = "%name%"
label-unfocused-padding = 2

;;;;;;;;;;;;;;;;;;;;;;;;;;
;; BLUETOOTH ;;
;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/bluetooth]
type = custom/script
exec = ~/.config/polybar/scripts/bluetooth.sh
interval = 5

format = <label>
label = %output%

click-left = blueman-manager &

;;;;;;;;;;;;;;;;;;;;;;;;;;
;; CPU ;;
;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/cpu]

type = custom/script
format-padding = 2
format-background = #2200f5ff
exec = ~/.config/polybar/scripts/cpu.sh
tail = true

click-left = alacritty -e htop &

